<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notification Test</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 24px; }
  h1 { font-size: 1.4rem; font-weight: 700; color: #f8fafc; margin-bottom: 4px; }
  p.sub { font-size: .85rem; color: #64748b; margin-bottom: 24px; }

  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media(max-width:700px){ .grid { grid-template-columns: 1fr; } }

  .card { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px; }
  .card h2 { font-size: .95rem; font-weight: 600; color: #94a3b8; margin-bottom: 14px; text-transform: uppercase; letter-spacing: .05em; }

  label { display: block; font-size: .8rem; color: #94a3b8; margin-bottom: 4px; margin-top: 12px; }
  input, textarea, select {
    width: 100%; padding: 8px 12px; border-radius: 8px;
    background: #0f172a; border: 1px solid #334155; color: #f1f5f9;
    font-size: .9rem; outline: none;
  }
  input:focus, textarea:focus { border-color: #6366f1; }
  textarea { resize: vertical; min-height: 70px; }

  button {
    margin-top: 14px; width: 100%; padding: 10px;
    border-radius: 8px; border: none; cursor: pointer;
    font-size: .9rem; font-weight: 600; transition: opacity .15s;
  }
  button:hover { opacity: .85; }
  button:disabled { opacity: .4; cursor: not-allowed; }
  .btn-primary { background: #6366f1; color: #fff; }
  .btn-success { background: #10b981; color: #fff; }
  .btn-danger  { background: #ef4444; color: #fff; }

  /* Status pill */
  .status-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 18px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: #ef4444; flex-shrink: 0; }
  .dot.connected { background: #10b981; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .status-text { font-size: .85rem; color: #94a3b8; }

  /* Notification feed */
  #feed { display: flex; flex-direction: column; gap: 10px; max-height: 380px; overflow-y: auto; }
  .notif {
    background: #0f172a; border: 1px solid #334155; border-radius: 10px;
    padding: 12px 14px; animation: slideIn .25s ease;
  }
  @keyframes slideIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }
  .notif.new { border-color: #6366f1; }
  .notif-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .notif-title { font-weight: 600; font-size: .9rem; }
  .badge {
    font-size: .7rem; padding: 2px 8px; border-radius: 99px; font-weight: 600;
    background: #1e293b; color: #94a3b8; border: 1px solid #334155;
  }
  .badge.general  { color: #6366f1; border-color: #6366f1; }
  .badge.alert    { color: #f59e0b; border-color: #f59e0b; }
  .badge.reminder { color: #10b981; border-color: #10b981; }
  .notif-body { font-size: .85rem; color: #94a3b8; }
  .notif-time { font-size: .75rem; color: #475569; margin-top: 6px; }

  .empty { text-align: center; color: #475569; font-size: .85rem; padding: 30px 0; }

  /* Log */
  #log { font-size: .78rem; font-family: monospace; color: #64748b; max-height: 120px; overflow-y: auto; }
  .log-line { padding: 2px 0; border-bottom: 1px solid #1e293b; }
  .log-line.ok  { color: #10b981; }
  .log-line.err { color: #ef4444; }
  .log-line.info{ color: #6366f1; }
</style>
</head>
<body>

<h1>🔔 Notification Test Panel</h1>
<p class="sub">Send a notification as Moderator → receive it in real-time as Student</p>

<div class="grid">

  <!-- LEFT: Send (Moderator) -->
  <div class="card">
    <h2>📤 Send — Moderator</h2>

    <label>API Base URL</label>
    <input id="baseUrl" value="http://localhost:5000" placeholder="http://localhost:5000">

    <label>Moderator JWT Token</label>
    <textarea id="modToken" placeholder="Paste moderator Bearer token here…"></textarea>

    <label>Student ID (UUID)</label>
    <input id="studentId" placeholder="ec7d0801-fe61-45c5-be66-571c190a96df">

    <label>Title</label>
    <input id="notifTitle" value="Test Notification">

    <label>Body</label>
    <input id="notifBody" value="Hello! This is a real-time notification.">

    <label>Type</label>
    <select id="notifType">
      <option value="general">general</option>
      <option value="alert">alert</option>
      <option value="reminder">reminder</option>
    </select>

    <button class="btn-primary" onclick="sendNotification()">Send Notification</button>
  </div>

  <!-- RIGHT: Receive (Student) -->
  <div class="card">
    <h2>📥 Receive — Student</h2>

    <div class="status-bar">
      <div class="dot" id="dot"></div>
      <span class="status-text" id="statusText">Disconnected</span>
    </div>

    <label>Student JWT Token</label>
    <textarea id="studentToken" placeholder="Paste student Bearer token here…"></textarea>

    <div style="display:flex;gap:8px;margin-top:14px">
      <button class="btn-success" style="margin-top:0" onclick="connect()">Connect</button>
      <button class="btn-danger"  style="margin-top:0" onclick="disconnect()">Disconnect</button>
    </div>

    <div style="margin-top:18px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-size:.8rem;color:#64748b">LIVE FEED</span>
        <button onclick="clearFeed()" style="width:auto;padding:4px 10px;margin-top:0;background:#1e293b;color:#94a3b8;border:1px solid #334155;border-radius:6px;font-size:.75rem">Clear</button>
      </div>
      <div id="feed"><div class="empty">Connect as student to receive notifications…</div></div>
    </div>
  </div>

</div>

<!-- Log -->
<div class="card" style="margin-top:20px">
  <h2>🖥 Console Log</h2>
  <div id="log"></div>
</div>

<script>
let connection = null;

function log(msg, type='info') {
  const d = document.getElementById('log');
  const line = document.createElement('div');
  line.className = `log-line ${type}`;
  line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  d.prepend(line);
}

function setStatus(connected) {
  document.getElementById('dot').className = 'dot' + (connected ? ' connected' : '');
  document.getElementById('statusText').textContent = connected ? 'Connected ✓' : 'Disconnected';
}

async function connect() {
  const token = document.getElementById('studentToken').value.trim().replace(/^Bearer\s+/i,'');
  const base  = document.getElementById('baseUrl').value.trim();
  if (!token) { alert('Paste the student JWT token first.'); return; }

  if (connection) { await connection.stop(); }

  connection = new signalR.HubConnectionBuilder()
    .withUrl(`${base}/hubs/notifications?access_token=${token}`)
    .withAutomaticReconnect()
    .configureLogging(signalR.LogLevel.Warning)
    .build();

  connection.on('ReceiveNotification', (data) => {
    log(`Notification received: "${data.title}"`, 'ok');
    addToFeed(data, true);
  });

  connection.onreconnecting(() => { setStatus(false); log('Reconnecting…'); });
  connection.onreconnected(() => { setStatus(true);  log('Reconnected!', 'ok'); });
  connection.onclose(()    => { setStatus(false); log('Connection closed.', 'err'); });

  try {
    await connection.start();
    setStatus(true);
    log('Connected to SignalR hub.', 'ok');
    document.getElementById('feed').innerHTML = '';
  } catch(e) {
    log('Connection failed: ' + e, 'err');
  }
}

async function disconnect() {
  if (connection) {
    await connection.stop();
    connection = null;
  }
}

async function sendNotification() {
  const base      = document.getElementById('baseUrl').value.trim();
  const token     = document.getElementById('modToken').value.trim().replace(/^Bearer\s+/i,'');
  const studentId = document.getElementById('studentId').value.trim();
  const title     = document.getElementById('notifTitle').value.trim();
  const body      = document.getElementById('notifBody').value.trim();
  const type      = document.getElementById('notifType').value;

  if (!token || !studentId) { alert('Fill in moderator token and student ID.'); return; }

  log(`Sending "${title}" to student ${studentId}…`);

  try {
    const res = await fetch(`${base}/api/moderator/students/${studentId}/notify`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      },
      body: JSON.stringify({ title, body, type })
    });
    const json = await res.json();
    if (res.ok) {
      log(`Server: ${json.message}`, 'ok');
    } else {
      log(`Error ${res.status}: ${JSON.stringify(json)}`, 'err');
    }
  } catch(e) {
    log('Fetch error: ' + e, 'err');
  }
}

function addToFeed(data, isNew = false) {
  const feed = document.getElementById('feed');
  const div  = document.createElement('div');
  div.className = 'notif' + (isNew ? ' new' : '');
  const time = data.createdAt ? new Date(data.createdAt).toLocaleTimeString() : new Date().toLocaleTimeString();
  div.innerHTML = `
    <div class="notif-header">
      <span class="notif-title">${escHtml(data.title)}</span>
      <span class="badge ${escHtml(data.type || 'general')}">${escHtml(data.type || 'general')}</span>
    </div>
    <div class="notif-body">${escHtml(data.body)}</div>
    <div class="notif-time">${time}</div>
  `;
  feed.prepend(div);
}

function clearFeed() {
  document.getElementById('feed').innerHTML = '<div class="empty">Feed cleared.</div>';
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
